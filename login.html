<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Login | Estratégia da Sorte</title>

  <style>

    :root{
      --bg:#050816;
      --bg2:#0b1023;
      --card:#0f172a;
      --border:rgba(255,255,255,.08);

      --text:#f8fafc;
      --text2:#94a3b8;

      --accent:#a855f7;
      --accent2:#7c3aed;

      --shadow:0 10px 40px rgba(0,0,0,.45);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;

      display:flex;
      align-items:center;
      justify-content:center;

      background:
      radial-gradient(circle at top left, rgba(168,85,247,.18), transparent 30%),
      radial-gradient(circle at bottom right, rgba(124,58,237,.14), transparent 30%),
      linear-gradient(180deg,var(--bg),var(--bg2));

      font-family:
      Inter,
      system-ui,
      sans-serif;

      color:var(--text);

      overflow:hidden;
    }

    .login-card{

      width:100%;
      max-width:430px;

      background:rgba(15,23,42,.72);

      border:1px solid var(--border);

      backdrop-filter:blur(18px);

      border-radius:28px;

      padding:42px 34px;

      box-shadow:var(--shadow);

      position:relative;
    }

    .glow{
      position:absolute;

      width:180px;
      height:180px;

      background:rgba(168,85,247,.15);

      filter:blur(70px);

      border-radius:50%;

      top:-60px;
      right:-60px;

      pointer-events:none;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:14px;

      margin-bottom:28px;
    }

    .logo-icon{

      width:48px;
      height:48px;

      border-radius:16px;

      background:linear-gradient(135deg,var(--accent),var(--accent2));

      display:flex;
      align-items:center;
      justify-content:center;

      font-weight:800;
      font-size:18px;
    }

    .logo-text h1{
      font-size:22px;
      font-weight:800;
      letter-spacing:-0.5px;
    }

    .logo-text p{
      color:var(--text2);
      font-size:13px;
      margin-top:2px;
    }

    .title{
      font-size:32px;
      line-height:1.1;
      font-weight:800;

      margin-bottom:14px;
    }

    .subtitle{
      color:var(--text2);
      font-size:15px;
      line-height:1.6;

      margin-bottom:34px;
    }

    .google-btn{

      width:100%;
      height:58px;

      border:none;
      border-radius:18px;

      background:linear-gradient(135deg,var(--accent),var(--accent2));

      color:white;

      font-size:15px;
      font-weight:700;

      cursor:pointer;

      transition:.25s;

      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
    }

    .google-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 25px rgba(168,85,247,.28);
    }

    .google-icon{
      font-size:20px;
    }

    .footer{
      margin-top:24px;

      color:var(--text2);

      font-size:12px;
      text-align:center;
      line-height:1.5;
    }

  </style>
</head>

<body>

  <div class="login-card">

    <div class="glow"></div>

    <div class="logo">

      <div class="logo-icon">
        ES
      </div>

      <div class="logo-text">
        <h1>ESTRATÉGIA DA SORTE</h1>
        <p>Análise Estatística de Loterias</p>
      </div>

    </div>

    <div class="title">
      Faça login para acessar seu painel de estratégias.
    </div>

    <div class="subtitle">
      Entre com sua conta autorizada para visualizar análises, estatísticas e estratégias avançadas.
    </div>

    <button id="googleLogin" class="google-btn">

      <span class="google-icon">✨</span>

      Entrar com Google

    </button>

    <div class="footer">
      Acesso restrito para usuários autorizados.
    </div>

  </div>

  <script type="module" src="./auth.js"></script>

</body>
</html>
